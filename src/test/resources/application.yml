spring:
  datasource:
    url: "jdbc:h2:mem:yeolmu_market;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE"
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-jwt-secret-must-be-over-32-bytes
  access-token-validity-seconds: 3600
  refresh-token-validity-seconds: 1209600
