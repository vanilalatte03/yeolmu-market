spring:
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
      - org.redisson.spring.starter.RedissonAutoConfigurationV4
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB
  datasource:
    url: "jdbc:h2:mem:yeolmu_market;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE"
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-jwt-secret-must-be-over-32-bytes
  access-token-validity-seconds: 3600
  refresh-token-validity-seconds: 1209600

auth:
  refresh-token-cookie:
    name: refreshToken
    path: /api/auth/refresh
    same-site: Lax
    secure: false

yeolmu:
  pagination:
    max-page-size: 100
  async:
    chat-message:
      core-pool-size: 2
      max-pool-size: 8
      queue-capacity: 1000
      await-termination-seconds: 10
  lock:
    wait-time: 10ms
    lease-time: 2s
    tx-timeout-seconds: 1
    redisson:
      enabled: false
  cache:
    search:
      products-v2:
        list-ttl: 30s
        display-ttl: 5m
  search:
    popular-keywords:
      default-limit: 10
      max-limit: 50
      recent-window-minutes: 60
      bucket-ttl: 70m
      recent-aggregate-ttl: 5s
  storage:
    local:
      root-path: build/test-uploads
      public-base-url: /uploads
      max-file-size: 5MB
