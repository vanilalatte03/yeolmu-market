spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: yeolmu-market
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  datasource:
    url: "${SPRING_DATASOURCE_URL}"
    username: "${SPRING_DATASOURCE_USERNAME}"
    password: "${SPRING_DATASOURCE_PASSWORD}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
  data:
    redis:
      host: "${SPRING_DATA_REDIS_HOST}"
      port: ${SPRING_DATA_REDIS_PORT}

jwt:
  secret: "${JWT_SECRET}"
  access-token-validity-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_SECONDS}
  refresh-token-validity-seconds: ${JWT_REFRESH_TOKEN_VALIDITY_SECONDS}

auth:
  refresh-token-cookie:
    name: refreshToken
    path: /api/auth/refresh
    same-site: Lax
    secure: ${AUTH_REFRESH_TOKEN_COOKIE_SECURE:false}

yeolmu:
  lock:
    wait-time: 500ms
    lease-time: 10s
    tx-timeout-seconds: 8
  cache:
    search:
      products-v2:
        ttl: 5m
  storage:
    local:
      root-path: build/uploads
      public-base-url: /uploads
      max-file-size: 5MB
