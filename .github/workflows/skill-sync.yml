name: Skill sync

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  check-skill-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check skill copies
        shell: pwsh
        run: ./scripts/check-skill-sync.ps1
